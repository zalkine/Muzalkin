<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MuZalkin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;700;800&family=Sora:wght@300;400;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans Hebrew', 'Sora', 'Segoe UI', sans-serif;
      background: #07070f;
      color: #e8e8f0;
      min-height: 100vh;
      direction: rtl;
      overflow-x: hidden;
    }

    /* ── Background gradient + noise ───────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 10%, #1a0a3a 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 20% 80%, #0d1a3a 0%, transparent 60%),
        #07070f;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Guitar background SVG ──────────────────────────────────────── */
    #guitar-bg {
      position: fixed;
      right: -60px;
      top: 50%;
      transform: translateY(-50%);
      width: 420px;
      opacity: 0.07;
      pointer-events: none;
      z-index: 0;
      filter: blur(1px);
    }

    /* ── Layout wrapper ─────────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 2rem;
      flex-wrap: wrap;
      gap: 0.75rem;
      border-bottom: 1px solid #ffffff0d;
      backdrop-filter: blur(6px);
      background: #07070f55;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: 'Sora', 'Noto Sans Hebrew', sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: #c4b5fd;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .logo .guitar-emoji { font-size: 1.5rem; }
    .logo span { color: #e8e8f0; }

    /* ── Auth bar ───────────────────────────────────────────────────── */
    #auth-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.85rem;
    }

    .user-greeting {
      color: #c4b5fd;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .user-email {
      color: #888;
      font-size: 0.78rem;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Hero section ───────────────────────────────────────────────── */
    .hero {
      padding: 4rem 2rem 2.5rem;
      max-width: 720px;
    }

    .hero-tag {
      display: inline-block;
      background: #a78bfa18;
      border: 1px solid #a78bfa33;
      color: #a78bfa;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 0.85rem;
      border-radius: 20px;
      margin-bottom: 1.2rem;
    }

    .hero h2 {
      font-family: 'Sora', 'Noto Sans Hebrew', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      line-height: 1.25;
      color: #f0f0ff;
      margin-bottom: 0.8rem;
    }

    .hero h2 .highlight {
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 1.05rem;
      color: #9090b0;
      line-height: 1.7;
      font-weight: 300;
      max-width: 540px;
    }

    /* ── Search area ────────────────────────────────────────────────── */
    .search-section {
      padding: 0 2rem 2rem;
    }

    .search-form {
      display: flex;
      gap: 0.6rem;
      max-width: 620px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      min-width: 160px;
      padding: 0.75rem 1.1rem;
      background: #12121e;
      border: 1.5px solid #2a2a40;
      border-radius: 12px;
      color: #e8e8f0;
      font-family: inherit;
      font-size: 1rem;
      direction: rtl;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      outline: none;
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px #a78bfa18;
    }

    input::placeholder { color: #44445a; }

    button {
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover  { opacity: 0.9; transform: translateY(-1px); }
    button:active { opacity: 1;   transform: translateY(0); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    button.btn-outline {
      background: transparent;
      color: #a78bfa;
      border: 1.5px solid #a78bfa44;
      padding: 0.45rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 8px;
    }

    button.btn-outline:hover {
      background: #a78bfa18;
      border-color: #a78bfa;
      transform: none;
    }

    /* ── Status + results ───────────────────────────────────────────── */
    #status {
      margin: 1rem 2rem 0;
      font-size: 0.82rem;
      color: #555570;
      min-height: 1.2em;
    }

    #results {
      display: none;
      margin: 1.25rem 2rem 3rem;
      max-width: 680px;
      background: #10101c;
      border: 1px solid #1e1e32;
      border-radius: 16px;
      padding: 1.5rem 1.75rem;
      box-shadow: 0 8px 40px #00000060;
    }

    .song-header { margin-bottom: 1.25rem; }
    .song-title  { font-size: 1.3rem; font-weight: 700; color: #fff; }
    .song-artist { font-size: 1rem; color: #a78bfa; margin-top: 0.15rem; }
    .song-meta   { font-size: 0.78rem; color: #44445a; margin-top: 0.4rem; }
    .song-meta a { color: #5555a0; text-decoration: underline; }

    .divider { border: none; border-top: 1px solid #1e1e32; margin: 1rem 0; }

    .line-chords {
      font-family: 'Courier New', 'Lucida Console', monospace;
      font-size: 0.95rem;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.08em;
      direction: ltr;
      text-align: left;
      padding: 1px 0;
      white-space: pre;
    }

    .line-lyrics {
      font-size: 0.98rem;
      color: #c8c8e0;
      line-height: 1.65;
      padding: 1px 0;
    }

    .line-section {
      font-size: 0.8rem;
      font-weight: 700;
      color: #f59e0b;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 1.2rem;
      margin-bottom: 0.2rem;
    }

    .error-box {
      background: #1e0a0a;
      border: 1px solid #5c2222;
      border-radius: 10px;
      padding: 0.9rem 1.1rem;
      color: #f87171;
    }

    #auth-loading { font-size: 0.8rem; color: #44445a; }

    /* ── Subtle string decoration lines ────────────────────────────── */
    .string-lines {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg,
        transparent 0%,
        #a78bfa22 20%,
        #a78bfa55 50%,
        #a78bfa22 80%,
        transparent 100%);
      z-index: 0;
    }
  </style>
</head>
<body>

<!-- Acoustic guitar background SVG -->
<svg id="guitar-bg" viewBox="0 0 240 620" xmlns="http://www.w3.org/2000/svg" fill="#a78bfa">
  <!-- Headstock -->
  <rect x="103" y="0" width="34" height="52" rx="8"/>
  <!-- Tuning pegs -->
  <circle cx="97"  cy="12" r="6"/><circle cx="97"  cy="30" r="6"/><circle cx="97"  cy="48" r="6"/>
  <circle cx="143" cy="12" r="6"/><circle cx="143" cy="30" r="6"/><circle cx="143" cy="48" r="6"/>
  <!-- Nut -->
  <rect x="100" y="50" width="40" height="6" rx="2"/>
  <!-- Neck -->
  <rect x="107" y="56" width="26" height="185" rx="4"/>
  <!-- Neck frets -->
  <rect x="107" y="80"  width="26" height="2" rx="1" fill="#ffffff"/>
  <rect x="107" y="105" width="26" height="2" rx="1" fill="#ffffff"/>
  <rect x="107" y="128" width="26" height="2" rx="1" fill="#ffffff"/>
  <rect x="107" y="149" width="26" height="2" rx="1" fill="#ffffff"/>
  <rect x="107" y="168" width="26" height="2" rx="1" fill="#ffffff"/>
  <rect x="107" y="186" width="26" height="2" rx="1" fill="#ffffff"/>
  <rect x="107" y="202" width="26" height="2" rx="1" fill="#ffffff"/>
  <rect x="107" y="217" width="26" height="2" rx="1" fill="#ffffff"/>
  <!-- Heel / neck joint -->
  <rect x="100" y="237" width="40" height="14" rx="4"/>
  <!-- Guitar body: upper bout -->
  <ellipse cx="120" cy="315" rx="72" ry="68"/>
  <!-- Guitar body: lower bout -->
  <ellipse cx="120" cy="460" rx="96" ry="92"/>
  <!-- Waist (mask to create waist indent) -->
  <rect x="88" y="360" width="64" height="58" fill="#07070f"/>
  <!-- Waist side curves to smooth the join -->
  <ellipse cx="88"  cy="388" rx="20" ry="34"/>
  <ellipse cx="152" cy="388" rx="20" ry="34"/>
  <!-- Sound hole -->
  <circle cx="120" cy="320" r="28" fill="#07070f"/>
  <circle cx="120" cy="320" r="28" fill="none" stroke="#a78bfa" stroke-width="4"/>
  <!-- Rosette ring -->
  <circle cx="120" cy="320" r="34" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <!-- Bridge -->
  <rect x="96" y="465" width="48" height="10" rx="4"/>
  <!-- Saddle -->
  <rect x="99" y="463" width="42" height="4" rx="2" fill="#ffffff"/>
  <!-- Strings (6 strings, LTR so they render as vertical lines) -->
  <line x1="108" y1="56" x2="108" y2="465" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>
  <line x1="113" y1="56" x2="113" y2="465" stroke="#ffffff" stroke-width="0.9" opacity="0.4"/>
  <line x1="118" y1="56" x2="118" y2="465" stroke="#ffffff" stroke-width="1.0" opacity="0.4"/>
  <line x1="122" y1="56" x2="122" y2="465" stroke="#ffffff" stroke-width="1.1" opacity="0.4"/>
  <line x1="127" y1="56" x2="127" y2="465" stroke="#ffffff" stroke-width="1.2" opacity="0.4"/>
  <line x1="132" y1="56" x2="132" y2="465" stroke="#ffffff" stroke-width="1.4" opacity="0.4"/>
</svg>

<div class="page">

  <!-- Header -->
  <header>
    <div class="logo">
      <span class="guitar-emoji">🎸</span>
      Mu<span>Zalkin</span>
    </div>
    <div id="auth-bar"><span id="auth-loading">טוען…</span></div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-tag">🎵 Chord App · Hebrew &amp; English</div>
    <h2>
      Welcome to <span class="highlight">MuZalkin</span><br/>
      The best place for playing your Music
    </h2>
    <p>חפש שיר בעברית או באנגלית וקבל את האקורדים מיד — מ-Tab4U, Ultimate Guitar ועוד.</p>
  </section>

  <!-- Search -->
  <section class="search-section">
    <form class="search-form" id="searchForm">
      <input type="text"  id="titleInput"  placeholder="שם השיר"            required autofocus />
      <input type="text"  id="artistInput" placeholder="שם האמן (לא חובה)" />
      <button type="submit" id="searchBtn">חפש</button>
    </form>
  </section>

  <div id="status"></div>
  <div id="results"></div>

</div>

<div class="string-lines"></div>

<script>
  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── Search ──────────────────────────────────────────────────────────────────

  const form        = document.getElementById('searchForm');
  const titleInput  = document.getElementById('titleInput');
  const artistInput = document.getElementById('artistInput');
  const searchBtn   = document.getElementById('searchBtn');
  const statusEl    = document.getElementById('status');
  const resultsEl   = document.getElementById('results');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const title  = titleInput.value.trim();
    const artist = artistInput.value.trim();
    if (!title) return;

    searchBtn.disabled = true;
    statusEl.textContent = 'מחפש…';
    resultsEl.style.display = 'none';

    const params = new URLSearchParams({ title, lang: 'he' });
    if (artist) params.set('artist', artist);

    try {
      const res  = await fetch(`/chords?${params}`);
      const data = await res.json();
      if (!res.ok) { showError(data.error ?? 'שגיאה לא ידועה'); statusEl.textContent = ''; return; }
      statusEl.textContent = `מקור: ${data.source}${data.from_cache ? ' · מהמטמון' : ''}`;
      renderResults(data, title, artist);
    } catch {
      showError('לא ניתן להתחבר לשרת');
      statusEl.textContent = '';
    } finally {
      searchBtn.disabled = false;
    }
  });

  function renderResults(data, title, artist) {
    const lines = data.chords_data ?? [];
    const linesHtml = lines.map(({ type, content }) => {
      const t = esc(content);
      if (type === 'chords')  return `<div class="line-chords">${t}</div>`;
      if (type === 'section') return `<div class="line-section">${t}</div>`;
      return `<div class="line-lyrics">${t}</div>`;
    }).join('');

    resultsEl.innerHTML = `
      <div class="song-header">
        <div class="song-title">${esc(title)}</div>
        ${artist ? `<div class="song-artist">${esc(artist)}</div>` : ''}
        ${data.raw_url ? `<div class="song-meta">מקור: <a href="${esc(data.raw_url)}" target="_blank" rel="noopener">${esc(data.raw_url)}</a></div>` : ''}
      </div>
      <hr class="divider" />
      ${linesHtml}
    `;
    resultsEl.style.display = 'block';
  }

  function showError(msg) {
    resultsEl.innerHTML = `<div class="error-box">${esc(msg)}</div>`;
    resultsEl.style.display = 'block';
  }

  // ── Auth ────────────────────────────────────────────────────────────────────

  let sb;

  async function initAuth() {
    let cfg;
    try { cfg = await fetch('/config').then(r => r.json()); }
    catch {
      document.getElementById('auth-bar').innerHTML =
        '<span style="color:#f87171;font-size:0.8rem">שגיאה בטעינת הגדרות</span>';
      return;
    }

    sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
      auth: {
        flowType: 'pkce',
        storage: {
          getItem:    k => Promise.resolve(localStorage.getItem(k)),
          setItem:    (k, v) => { localStorage.setItem(k, v); return Promise.resolve(); },
          removeItem: k => { localStorage.removeItem(k); return Promise.resolve(); },
        },
      },
    });

    const code = new URLSearchParams(window.location.search).get('code');
    if (code) {
      const { error } = await sb.auth.exchangeCodeForSession(code);
      if (error) console.error('Code exchange failed:', error.message);
      window.history.replaceState({}, '', window.location.pathname);
    }

    const { data: { session } } = await sb.auth.getSession();
    renderAuthBar(session?.user ?? null);
    sb.auth.onAuthStateChange((_event, session) => renderAuthBar(session?.user ?? null));
  }

  function getUserName(user) {
    // Google OAuth → full_name or name in user_metadata
    return user.user_metadata?.full_name
        || user.user_metadata?.name
        || user.email?.split('@')[0]
        || 'אורח';
  }

  function renderAuthBar(user) {
    const bar = document.getElementById('auth-bar');
    if (user) {
      const name = esc(getUserName(user));
      bar.innerHTML = `
        <span class="user-greeting">👋 שלום, ${name}</span>
        <button class="btn-outline" id="logoutBtn">התנתק</button>
      `;
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await sb.auth.signOut();
      });
    } else {
      bar.innerHTML = `<button class="btn-outline" id="loginBtn">התחבר עם Google</button>`;
      document.getElementById('loginBtn').addEventListener('click', async () => {
        await sb.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin },
        });
      });
    }
  }

  initAuth();
</script>
</body>
</html>
